<!DOCTYPE html>
<html lang="de" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Boldclaim — Bring your own AI. Wir sehen deine Counter nie.">
  <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)">
  <title>Boldclaim</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>•</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; overscroll-behavior: none; }
    body { -webkit-font-smoothing: antialiased; }
    .scroll-area::-webkit-scrollbar { width: 6px; }
    .scroll-area::-webkit-scrollbar-thumb { background: rgba(160,160,160,0.35); border-radius: 3px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    [x-cloak] { display: none !important; }
    .msg-fade { animation: fadeIn .25s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .typing::after {
      content: '▍';
      animation: blink 1s steps(2) infinite;
      opacity: .5;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }
    textarea { field-sizing: content; }
    .topic-pill { transition: background .15s, transform .1s, border-color .15s; }
    .topic-pill:active { transform: scale(0.97); }
    .drag-over { outline: 2px dashed rgba(0,0,0,.25); outline-offset: -8px; border-radius: 18px; }
    .dark .drag-over { outline-color: rgba(255,255,255,.3); }
    .modal-backdrop { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    /* Sexy radial spotlight in welcome */
    .hero-bg {
      background-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(120,113,108,0.08), transparent 60%);
    }
    .dark .hero-bg {
      background-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(244,244,245,0.06), transparent 60%);
    }
    /* Markdown content styling */
    .prose-content { line-height: 1.6; word-wrap: break-word; overflow-wrap: anywhere; }
    .prose-content p { margin: 0 0 0.65em 0; }
    .prose-content p:last-child { margin-bottom: 0; }
    .prose-content strong { font-weight: 600; }
    .prose-content em { font-style: italic; }
    .prose-content ul { list-style: disc; padding-left: 1.4em; margin: 0.5em 0; }
    .prose-content ol { list-style: decimal; padding-left: 1.6em; margin: 0.5em 0; }
    .prose-content li { margin: 0.2em 0; }
    .prose-content h3.section-header {
      font-size: 0.85em;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin: 0.9em 0 0.3em 0;
      padding-top: 0.2em;
      color: inherit;
      scroll-margin-top: 60px;
    }
    .prose-content h3.section-header:first-child { margin-top: 0; padding-top: 0; }
    .prose-content a.link {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
      word-break: break-all;
      overflow-wrap: anywhere;
    }
    .prose-content a.link:hover { text-decoration-thickness: 2px; }
    .prose-content blockquote {
      border-left: 3px solid currentColor;
      opacity: .7;
      padding-left: 0.8em;
      margin: 0.5em 0;
    }
    @keyframes sectionFlash {
      0%, 100% { background-color: transparent; }
      40% { background-color: rgba(250,204,21,0.28); }
    }
    .section-flash { animation: sectionFlash 1.6s ease; border-radius: 6px; }
    .dark .section-flash { animation: sectionFlashDark 1.6s ease; }
    @keyframes sectionFlashDark {
      0%, 100% { background-color: transparent; }
      40% { background-color: rgba(250,204,21,0.18); }
    }
    .section-active {
      background-color: rgba(250,204,21,0.12);
      border-radius: 6px;
      padding-left: 0.6em;
      padding-right: 0.6em;
      transition: background-color 0.2s ease;
    }
    .dark .section-active {
      background-color: rgba(250,204,21,0.08);
    }
    .section-active.section-header {
      padding-top: 0.3em;
      padding-bottom: 0.1em;
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script>
    // Light default. Dark only if user explicitly toggled.
    (function() {
      if (localStorage.getItem('boldclaim_theme_v2') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body class="h-full bg-stone-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans antialiased">

<div x-data="boldclaimApp()" x-init="init()" x-cloak class="flex h-full">

  <!-- Sidebar (history) -->
  <aside x-show="sidebarOpen"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="-translate-x-full sm:translate-x-0 sm:opacity-0"
         x-transition:enter-end="translate-x-0 opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="translate-x-0 opacity-100"
         x-transition:leave-end="-translate-x-full sm:translate-x-0 sm:opacity-0"
         @click.outside="if (window.innerWidth < 1024) sidebarOpen = false"
         class="fixed sm:static inset-y-0 left-0 z-30 w-72 bg-white dark:bg-zinc-900 border-r border-zinc-200 dark:border-zinc-800 flex flex-col shrink-0">
    <div class="h-12 px-4 flex items-center justify-between border-b border-zinc-200 dark:border-zinc-800">
      <span class="text-sm font-semibold tracking-tight" x-text="t('sidebar.history')"></span>
      <button @click="sidebarOpen=false" class="lg:hidden p-1.5 rounded text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-800">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <button @click="newChat()"
            class="m-3 px-3 py-2 text-sm font-medium rounded-lg bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 hover:bg-zinc-800 dark:hover:bg-white transition flex items-center justify-center gap-2 shrink-0">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      <span x-text="t('sidebar.newChat')"></span>
    </button>
    <div class="flex-1 overflow-y-auto scroll-area px-2 pb-3 space-y-1">
      <template x-for="conv in archive" :key="conv.id">
        <div class="group flex items-center gap-1">
          <button @click="loadConversation(conv.id)"
                  :class="conv.id === activeConvId ? 'bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100' : 'text-zinc-700 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800'"
                  class="flex-1 min-w-0 text-left px-3 py-2 rounded-lg text-sm transition truncate">
            <span x-text="conv.title"></span>
          </button>
          <button @click="deleteConversation(conv.id)"
                  class="opacity-0 group-hover:opacity-100 p-1.5 rounded text-zinc-400 hover:text-red-500 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </template>
      <div x-show="archive.length === 0" class="text-center text-xs text-zinc-400 dark:text-zinc-600 mt-8 px-4" x-text="t('sidebar.empty')"></div>
    </div>
    <div class="p-3 border-t border-zinc-200 dark:border-zinc-800 text-[11px] text-zinc-400 dark:text-zinc-600" x-text="t('sidebar.privacy')"></div>
  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div x-show="sidebarOpen" x-transition.opacity
       @click="sidebarOpen=false"
       class="fixed inset-0 bg-black/30 z-20 lg:hidden"></div>

  <!-- Main column -->
  <div class="flex flex-col flex-1 min-w-0">

    <!-- Header -->
    <header class="flex items-center justify-between px-4 sm:px-6 h-12 border-b border-zinc-200 dark:border-zinc-800 shrink-0 bg-white/70 dark:bg-zinc-950/70 backdrop-blur">
      <div class="flex items-center gap-2">
        <button @click="sidebarOpen=!sidebarOpen"
                :title="t('header.history') + ' (⌘B / Ctrl+B)'"
                class="p-2 -ml-2 rounded-md text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="text-base font-semibold tracking-tight">Boldclaim</span>
      </div>
      <div class="flex items-center gap-1">
        <!-- Language toggle (site-wide) -->
        <div class="flex items-center text-[11px] font-mono mr-1 rounded-md overflow-hidden border border-zinc-200 dark:border-zinc-800">
          <button @click="setLang('de')"
                  :class="settings.lang==='de' ? 'bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900' : 'bg-transparent text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100'"
                  class="px-2 py-1 transition">DE</button>
          <button @click="setLang('en')"
                  :class="settings.lang==='en' ? 'bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900' : 'bg-transparent text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100'"
                  class="px-2 py-1 transition">EN</button>
        </div>
        <button @click="toggleTheme()" :title="dark ? t('theme.light') : t('theme.dark')"
                class="p-2 rounded-md text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">
          <svg x-show="!dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg x-show="dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button @click="settingsOpen=true" title="Einstellungen"
                class="p-2 rounded-md text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- Onboarding banner (no key) -->
    <div x-show="!hasKey() && !settingsOpen && messages.length === 0"
         class="bg-amber-100 dark:bg-amber-500/10 border-b border-amber-300 dark:border-amber-500/30 text-amber-900 dark:text-amber-200 text-sm px-4 sm:px-6 py-2 flex items-center justify-between">
      <span x-text="t('banner.needKey')"></span>
      <button @click="settingsOpen=true; settingsTab='onboarding'"
              class="font-semibold underline hover:no-underline" x-text="t('banner.setup')"></button>
    </div>

    <!-- Main scroll area -->
    <main class="flex-1 overflow-y-auto scroll-area"
          @drop.prevent="handleDrop($event)"
          @dragover.prevent="dragOver=true"
          @dragleave="dragOver=false"
          :class="dragOver && 'drag-over'">

      <!-- Welcome state -->
      <div x-show="messages.length === 0" class="hero-bg max-w-2xl mx-auto px-6 pt-16 sm:pt-24 pb-8">
        <h1 class="text-4xl sm:text-5xl font-bold tracking-tight leading-[1.1]">
          <span x-text="t('welcome.titleA')"></span>
          <span class="block text-zinc-400 dark:text-zinc-500" x-text="t('welcome.titleB')"></span>
        </h1>
        <!-- Progressive disclosure: button -> topics -> claims -> typing clears all -->
        <div x-show="!input.trim()" x-transition.opacity.duration.200ms>

          <!-- Step 1: button (initial state, before topics revealed) -->
          <button x-show="!topicsVisible"
                  @click="topicsVisible = true"
                  x-transition.opacity.duration.150ms
                  class="mt-10 inline-flex items-center gap-2 text-sm px-4 py-2 rounded-full bg-white dark:bg-zinc-800/70 hover:bg-zinc-50 dark:hover:bg-zinc-700 text-zinc-700 dark:text-zinc-200 border border-zinc-200 dark:border-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-600 shadow-sm">
            <span x-text="t('examples.button')"></span>
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

          <!-- Step 2+3: caption + chips + claims (after button click) -->
          <div x-show="topicsVisible"
               x-transition:enter="transition-all duration-200 ease-out"
               x-transition:enter-start="opacity-0 translate-y-1"
               x-transition:enter-end="opacity-100 translate-y-0">
            <p class="mt-10 text-[11px] uppercase tracking-wider font-semibold text-zinc-500 dark:text-zinc-500"
               x-text="t('examples.label')"></p>

            <!-- Topic chips -->
            <div class="mt-3 flex flex-wrap gap-2">
              <template x-for="group in examples" :key="group.cat">
                <button @click="selectedExampleCat = (selectedExampleCat === group.cat ? null : group.cat)"
                        class="topic-pill text-sm px-3.5 py-1.5 rounded-full border shadow-sm transition-colors"
                        :class="selectedExampleCat === group.cat
                          ? 'bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 border-zinc-900 dark:border-zinc-100'
                          : 'bg-white dark:bg-zinc-800/70 hover:bg-zinc-50 dark:hover:bg-zinc-700 text-zinc-700 dark:text-zinc-200 border-zinc-200 dark:border-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-600'">
                  <span x-text="group.cat"></span>
                </button>
              </template>
            </div>

            <!-- Step 3: claims preview, after topic clicked -->
            <div x-show="selectedExampleCat"
                 x-transition:enter="transition-all duration-200 ease-out"
                 x-transition:enter-start="opacity-0 translate-y-1"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 class="mt-6 space-y-2">
              <template x-for="point in currentExamplePoints()" :key="point">
                <button @click="useExample(point)"
                        class="block w-full text-left text-sm px-4 py-3 rounded-2xl bg-white dark:bg-zinc-800/50 hover:bg-zinc-50 dark:hover:bg-zinc-800 border border-zinc-200 dark:border-zinc-700/60 text-zinc-800 dark:text-zinc-200 leading-snug shadow-sm">
                  <span x-text="'„' + point + '“'"></span>
                </button>
              </template>
            </div>
          </div>
        </div>
        <div class="mt-12 flex flex-wrap gap-x-3 gap-y-1 text-xs text-zinc-500 dark:text-zinc-500">
          <button @click="settingsOpen=true; settingsTab='onboarding'" class="underline hover:text-zinc-700 dark:hover:text-zinc-300" x-text="t('welcome.setup')"></button>
          <button @click="settingsOpen=true; settingsTab='privacy'" class="underline hover:text-zinc-700 dark:hover:text-zinc-300" x-text="t('welcome.privacy')"></button>
          <a href="https://github.com/boldclaim/boldclaim.github.io" target="_blank" rel="noopener" class="underline hover:text-zinc-700 dark:hover:text-zinc-300" x-text="t('welcome.code')"></a>
          <a href="./modi.html" class="underline hover:text-zinc-700 dark:hover:text-zinc-300">Modi erklärt</a>
        </div>
      </div>

      <!-- Messages -->
      <div x-show="messages.length > 0" class="max-w-2xl mx-auto px-4 sm:px-6 py-6 space-y-5">
        <template x-for="msg in messages" :key="msg.id">
          <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'" class="msg-fade">
            <div :class="msg.role === 'user'
                  ? 'bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-2xl rounded-br-md shadow-sm'
                  : 'bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 rounded-2xl rounded-bl-md border border-zinc-200 dark:border-zinc-800 shadow-sm'"
                 class="max-w-full sm:max-w-[88%] px-4 py-3">

              <!-- Images -->
              <template x-if="msg.images && msg.images.length">
                <div class="flex flex-wrap gap-2 mb-2">
                  <template x-for="(img, i) in msg.images" :key="i">
                    <img :src="img" @click="lightboxImg=img"
                         class="rounded-lg max-h-48 cursor-zoom-in border border-zinc-300/30 dark:border-zinc-700">
                  </template>
                </div>
              </template>

              <!-- Body -->
              <template x-if="msg.role === 'user'">
                <div class="whitespace-pre-wrap leading-relaxed text-[15px]" style="overflow-wrap: anywhere; word-break: break-word;" x-text="msg.content"></div>
              </template>
              <template x-if="msg.role === 'assistant'">
                <div>
                  <!-- Analysis (collapsible, only if present) -->
                  <details x-show="splitContent(msg.content).analysis.length > 0"
                           class="mb-3 rounded-lg border border-amber-200 dark:border-amber-900/40 bg-amber-50 dark:bg-amber-500/5 group">
                    <summary class="px-3 py-2 cursor-pointer text-xs font-semibold text-amber-900 dark:text-amber-200 list-none flex items-center gap-2 select-none">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="transition group-open:rotate-90"><polyline points="9 18 15 12 9 6"/></svg>
                      <span x-text="t('msg.analysisTitle')"></span>
                      <span class="ml-auto text-[10px] font-normal opacity-60" x-text="t('msg.analysisHint')"></span>
                    </summary>
                    <div class="px-3 pb-3 pt-1 prose-content text-[14px] text-amber-950 dark:text-amber-100"
                         x-html="renderMarkdown(splitContent(msg.content).analysis)"></div>
                  </details>
                  <!-- Reply (click sections to see purpose annotation) -->
                  <div class="prose-content text-[15px] cursor-pointer"
                       :class="msg.streaming && 'typing'"
                       :data-msg-id="msg.id"
                       @click="onSectionClick($event)"
                       x-html="renderMarkdown(splitContent(msg.content).reply)"></div>
                </div>
              </template>

              <!-- Trust badge (assistant only, driven by msg.trust; 'unknown'/unset renders nothing) -->
              <template x-if="msg.role === 'assistant' && !msg.streaming && msg.trust && msg.trust !== 'unknown'">
                <div class="mt-2.5">
                  <template x-if="msg.trust === 'checking'">
                    <span class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-[11px] font-medium bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-700">
                      <span class="w-1.5 h-1.5 rounded-full bg-zinc-400 dark:bg-zinc-500 animate-pulse"></span>
                      <span x-text="t('trust.checking')"></span>
                    </span>
                  </template>
                  <template x-if="msg.trust === 'pass'">
                    <span class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-[11px] font-medium bg-emerald-50 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-300 border border-emerald-200 dark:border-emerald-500/30">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                      <span x-text="t('trust.pass')"></span>
                    </span>
                  </template>
                  <template x-if="msg.trust === 'fail'">
                    <span class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-[11px] font-medium bg-amber-50 dark:bg-amber-500/10 text-amber-800 dark:text-amber-200 border border-amber-300 dark:border-amber-500/40">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                      <span x-text="t('trust.fail')"></span>
                    </span>
                  </template>
                  <template x-if="msg.trust === 'unsure'">
                    <span class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-[11px] font-medium bg-zinc-50 dark:bg-zinc-800/60 text-zinc-500 dark:text-zinc-400 border border-zinc-200 dark:border-zinc-700">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                      <span x-text="t('trust.unsure')"></span>
                    </span>
                  </template>
                </div>
              </template>

              <!-- Footer (assistant only) -->
              <template x-if="msg.role === 'assistant' && !msg.streaming">
                <div class="mt-2.5 pt-2 border-t border-zinc-100 dark:border-zinc-800 flex flex-wrap items-center gap-3 text-xs text-zinc-500">
                  <button @click="copyAs(msg, 'reddit', $event)" class="hover:text-zinc-900 dark:hover:text-zinc-200 flex items-center gap-1">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    <span x-text="msg.copiedAs === 'reddit' ? t('msg.copiedReddit') : t('msg.copyReddit')"></span>
                  </button>
                  <button @click="copyAs(msg, 'plain', $event)" class="hover:text-zinc-900 dark:hover:text-zinc-200 flex items-center gap-1">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <span x-text="msg.copiedAs === 'plain' ? t('msg.copiedPlain') : t('msg.copyPlain')"></span>
                  </button>
                  <template x-if="msg.sources && msg.sources.length">
                    <details class="group">
                      <summary class="cursor-pointer hover:text-zinc-900 dark:hover:text-zinc-200 list-none flex items-center gap-1">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="transition group-open:rotate-90"><polyline points="9 18 15 12 9 6"/></svg>
                        <span x-text="t('msg.sources') + ' (' + msg.sources.length + ')'"></span>
                      </summary>
                      <div class="mt-2 space-y-1.5 text-zinc-600 dark:text-zinc-400">
                        <template x-for="(s, i) in msg.sources" :key="i">
                          <div class="border-l border-zinc-300 dark:border-zinc-700 pl-3">
                            <div class="text-[11px] font-mono text-zinc-500 dark:text-zinc-500" x-text="s.source"></div>
                            <div class="text-[12px]" x-text="s.snippet"></div>
                          </div>
                        </template>
                      </div>
                    </details>
                  </template>
                </div>
              </template>

              <!-- Error -->
              <template x-if="msg.error">
                <div class="mt-2 text-xs text-red-600 dark:text-red-400 border-l-2 border-red-500/50 pl-2">
                  <span x-text="msg.error"></span>
                  <button @click="settingsOpen=true" class="underline ml-1">Settings</button>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </main>

    <!-- Composer -->
    <footer class="border-t border-zinc-200 dark:border-zinc-800 px-3 sm:px-4 pt-3 pb-4 shrink-0 bg-stone-50 dark:bg-zinc-950">
      <div class="max-w-2xl mx-auto">

        <!-- Quick platform/tone selectors -->
        <div class="flex flex-wrap items-center gap-1.5 mb-2 px-1 text-xs">
          <span class="text-zinc-400 dark:text-zinc-600" x-text="t('comp.for')"></span>
          <select x-model="settings.platform" @change="saveSettings()"
                  class="bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-md px-2 py-1 font-medium text-zinc-700 dark:text-zinc-300 focus:outline-none focus:border-zinc-400 dark:focus:border-zinc-600 cursor-pointer">
            <option value="Reddit" x-text="t('platform.reddit')"></option>
            <option value="X/Twitter" x-text="t('platform.twitter')"></option>
            <option value="Mündlich" x-text="t('platform.spoken')"></option>
            <option value="WhatsApp" x-text="t('platform.whatsapp')"></option>
          </select>
          <span class="text-zinc-400 dark:text-zinc-600" x-text="t('comp.view')"></span>
          <div class="inline-flex rounded-md border border-zinc-200 dark:border-zinc-700 overflow-hidden">
            <button type="button" @click="settings.selectorStyle='pills'; saveSettings()"
              class="px-2 py-1 font-medium transition"
              :class="settings.selectorStyle==='pills' ? 'bg-indigo-600 text-white' : 'bg-white dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300'">Pills</button>
            <button type="button" @click="settings.selectorStyle='pad'; saveSettings()"
              class="px-2 py-1 font-medium transition border-l border-zinc-200 dark:border-zinc-700"
              :class="settings.selectorStyle==='pad' ? 'bg-indigo-600 text-white' : 'bg-white dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300'">Pad</button>
          </div>
          <template x-if="settings.selectorStyle==='pills'">
            <span class="inline-flex flex-wrap items-center gap-1.5">
              <span class="text-zinc-400 dark:text-zinc-600" x-text="t('comp.cat')"></span>
              <div class="inline-flex rounded-md border border-zinc-200 dark:border-zinc-700 overflow-hidden">
                <template x-for="c in cats" :key="'cc'+c[0]">
                  <button type="button" @click="settings.category=c[0]; userOverrodePicker=true; saveSettings()"
                    class="px-2 py-1 font-medium transition border-l first:border-l-0 border-zinc-200 dark:border-zinc-700"
                    :class="settings.category===c[0] ? 'bg-indigo-600 text-white' : 'bg-white dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-50 dark:hover:bg-zinc-700'"
                    x-text="t(c[1])"></button>
                </template>
              </div>
              <span class="text-zinc-400 dark:text-zinc-600" x-text="t('comp.hard')"></span>
              <div class="inline-flex rounded-md border border-zinc-200 dark:border-zinc-700 overflow-hidden">
                <template x-for="h in hards" :key="'ch'+h[0]">
                  <button type="button" @click="settings.hardness=h[0]; userOverrodePicker=true; saveSettings()"
                    class="px-2 py-1 font-medium transition border-l first:border-l-0 border-zinc-200 dark:border-zinc-700"
                    :class="settings.hardness===h[0] ? 'bg-indigo-600 text-white' : 'bg-white dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-50 dark:hover:bg-zinc-700'"
                    x-text="t(h[1])"></button>
                </template>
              </div>
            </span>
          </template>
          <template x-if="settings.selectorStyle==='pad'">
            <span class="inline-flex items-center gap-2">
              <div class="flex gap-1 items-center">
                <div class="flex flex-col justify-between self-stretch text-[8px] leading-none uppercase text-zinc-400 dark:text-zinc-600 text-right py-0.5">
                  <template x-for="h in hards" :key="'crl'+h[0]"><span x-text="t(h[1])"></span></template>
                </div>
                <div class="grid grid-cols-3 gap-1.5">
                  <template x-for="h in hards" :key="'cr'+h[0]"><template x-for="c in cats" :key="'ccell'+c[0]+h[0]">
                    <button type="button" :title="t(c[1])+' · '+t(h[1])" @click="settings.category=c[0]; settings.hardness=h[0]; userOverrodePicker=true; saveSettings()"
                      class="w-4 h-4 rounded-full border transition"
                      :class="(settings.category===c[0]&&settings.hardness===h[0]) ? 'bg-indigo-600 border-indigo-600 scale-125' : 'border-zinc-300 dark:border-zinc-600 hover:border-indigo-400'"></button>
                  </template></template>
                </div>
              </div>
              <span class="text-zinc-500 dark:text-zinc-400 font-medium" x-text="settings.category + ' · ' + settings.hardness"></span>
            </span>
          </template>

          <!-- Advisory style suggestion (Vorschlag). Never auto-applies, never hides the manual picker. -->
          <template x-if="recoStyle">
            <button type="button"
                    @click="if(!userOverrodePicker) applyRecoStyle()"
                    :title="recoReasonText()"
                    :disabled="userOverrodePicker"
                    class="inline-flex items-center gap-1 rounded-md border border-dashed border-amber-400/70 dark:border-amber-500/50 bg-amber-50/70 dark:bg-amber-500/10 text-amber-700 dark:text-amber-300 px-2 py-1 font-medium transition"
                    :class="userOverrodePicker ? 'opacity-60 cursor-default' : 'hover:bg-amber-100 dark:hover:bg-amber-500/20 cursor-pointer'">
              <span class="uppercase text-[9px] tracking-wide text-amber-600/80 dark:text-amber-400/80" x-text="t('comp.reco')"></span>
              <span x-text="recoStyleLabel(recoStyle)"></span>
            </button>
          </template>
          <template x-if="recoStyle">
            <span class="text-zinc-400 dark:text-zinc-600 basis-full pl-1" x-text="recoReasonText()"></span>
          </template>
        </div>

        <!-- Pending images -->
        <div x-show="pendingImages.length" class="flex flex-wrap gap-2 mb-2">
          <template x-for="(img, i) in pendingImages" :key="i">
            <div class="relative">
              <img :src="img" class="h-16 w-16 object-cover rounded-md border border-zinc-300 dark:border-zinc-700 shadow-sm">
              <button @click="pendingImages.splice(i,1)"
                      class="absolute -top-1.5 -right-1.5 bg-zinc-700 hover:bg-zinc-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">×</button>
            </div>
          </template>
        </div>

        <div class="flex items-end gap-2 bg-white dark:bg-zinc-800/70 rounded-2xl px-3 py-2 border border-zinc-300 dark:border-zinc-700 ring-1 ring-zinc-900/5 dark:ring-white/5 shadow-lg shadow-zinc-900/5 dark:shadow-black/40 focus-within:border-zinc-400 dark:focus-within:border-zinc-600 focus-within:ring-zinc-900/10 dark:focus-within:ring-white/10 transition">
          <button @click="$refs.fileInput.click()"
                  :title="t('comp.attach')"
                  class="p-1.5 text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-200 transition shrink-0">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="file" multiple accept="image/*" x-ref="fileInput" @change="handleFiles($event)" class="hidden">
          <textarea x-model="input"
                    @input="recommendStyle()"
                    @paste="handlePaste($event)"
                    @keydown.enter.prevent="if(!$event.shiftKey) send()"
                    @keydown.cmd.enter.prevent="send()"
                    @keydown.ctrl.enter.prevent="send()"
                    rows="1"
                    :placeholder="busy ? t('comp.busy') : t('comp.placeholder')"
                    :disabled="busy"
                    class="flex-1 bg-transparent resize-none outline-none text-[15px] py-1.5 max-h-48 placeholder-zinc-400 dark:placeholder-zinc-500 text-zinc-900 dark:text-zinc-50"></textarea>
          <button @click="busy ? cancel() : send()"
                  :disabled="!busy && !canSend()"
                  :class="busy ? 'bg-red-500/90 hover:bg-red-500 text-white' : (canSend() ? 'bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 hover:bg-black dark:hover:bg-white' : 'bg-zinc-200 dark:bg-zinc-800 text-zinc-400 dark:text-zinc-600')"
                  class="rounded-full p-2 transition shrink-0 shadow-sm">
            <template x-if="!busy">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l14 0M13 6l6 6-6 6"/></svg>
            </template>
            <template x-if="busy">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            </template>
          </button>
        </div>
        <div class="mt-1.5 px-2 flex items-center justify-between text-[11px] text-zinc-500 dark:text-zinc-500 gap-2">
          <div class="flex items-center gap-1.5 min-w-0">
            <template x-if="hasKey()">
              <div class="flex items-center gap-1.5 min-w-0">
                <span class="opacity-70 capitalize" x-text="settings.provider"></span>
                <span class="opacity-40">·</span>
                <select x-model="settings.model" @change="customMode = !modelsForProvider().some(m => m.id === settings.model); saveSettings()"
                        class="bg-transparent border-0 cursor-pointer hover:text-zinc-900 dark:hover:text-zinc-100 outline-none font-mono py-0 pr-1"
                        :title="t('set.model')">
                  <template x-for="m in modelsForProvider()" :key="m.id">
                    <option :value="m.id" x-text="m.label"></option>
                  </template>
                  <option x-show="customMode" :value="settings.model" x-text="(settings.model || '...') + ' (custom)'"></option>
                </select>
              </div>
            </template>
            <template x-if="!hasKey()">
              <button @click="settingsOpen=true" class="hover:text-zinc-900 dark:hover:text-zinc-100" x-text="t('comp.noKey')"></button>
            </template>
          </div>
          <span x-show="messages.length > 0" class="shrink-0" x-text="countUserMsgs() + ' ' + (countUserMsgs()===1 ? t('comp.turn') : t('comp.turns'))"></span>
        </div>
      </div>
    </footer>
  </div>

  <!-- Floating annotation card (replaces right sidebar) -->
  <div x-show="activeSection && currentSection()"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 translate-y-3"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0 translate-y-3"
       class="fixed bottom-32 right-4 left-4 sm:left-auto sm:max-w-sm z-30">
    <div class="bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl shadow-2xl shadow-black/20 p-4">
      <div class="flex items-start gap-3">
        <div class="flex-1 min-w-0">
          <div class="text-[10px] font-mono uppercase tracking-wider text-zinc-500"
               x-text="(currentSectionIdx().idx) + ' / ' + currentSectionIdx().total + ' · ' + t('msg.analysisHint').replace(/[()]/g, '').toUpperCase()"></div>
          <div class="font-semibold text-zinc-900 dark:text-zinc-100 mt-1 leading-tight"
               x-text="currentSection()?.title"></div>
          <div class="text-sm text-zinc-600 dark:text-zinc-400 mt-2 leading-relaxed"
               x-text="currentSection()?.purpose || (settings.lang === 'de' ? 'Keine Zweck-Annotation. Modell hat <!--purpose: ...--> nicht emittiert.' : 'No purpose annotation. Model did not emit <!--purpose: ...-->.')"></div>
        </div>
        <button @click="dismissSection()"
                class="p-1 -m-1 text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 shrink-0"
                title="Schließen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="mt-3 flex gap-2" x-show="currentSectionIdx().total > 1">
        <button @click="prevSection()"
                :disabled="currentSectionIdx().idx <= 1"
                class="flex-1 text-xs px-3 py-1.5 bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-md disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-1">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          <span x-text="settings.lang === 'de' ? 'Zurück' : 'Prev'"></span>
        </button>
        <button @click="nextSection()"
                :disabled="currentSectionIdx().idx >= currentSectionIdx().total"
                class="flex-1 text-xs px-3 py-1.5 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 hover:bg-black dark:hover:bg-white rounded-md disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-1">
          <span x-text="settings.lang === 'de' ? 'Weiter' : 'Next'"></span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div x-show="settingsOpen"
       x-transition.opacity
       @click.self="settingsOpen=false"
       class="fixed inset-0 modal-backdrop bg-black/40 dark:bg-black/60 flex items-end sm:items-center justify-center z-40 p-0 sm:p-4">
    <div @click.stop
         class="bg-white dark:bg-zinc-900 border-t sm:border border-zinc-200 dark:border-zinc-800 sm:rounded-2xl w-full sm:max-w-md max-h-[92vh] overflow-y-auto scroll-area shadow-2xl">

      <!-- Tabs -->
      <div class="flex border-b border-zinc-200 dark:border-zinc-800 sticky top-0 bg-white dark:bg-zinc-900 z-10">
        <button @click="settingsTab='general'"
                :class="settingsTab==='general' ? 'text-zinc-900 dark:text-zinc-100 border-zinc-900 dark:border-zinc-100' : 'text-zinc-500 border-transparent'"
                class="flex-1 py-3 text-sm font-medium border-b-2 transition" x-text="t('set.tab.general')"></button>
        <button @click="settingsTab='onboarding'"
                :class="settingsTab==='onboarding' ? 'text-zinc-900 dark:text-zinc-100 border-zinc-900 dark:border-zinc-100' : 'text-zinc-500 border-transparent'"
                class="flex-1 py-3 text-sm font-medium border-b-2 transition" x-text="t('set.tab.setup')"></button>
        <button @click="settingsTab='privacy'"
                :class="settingsTab==='privacy' ? 'text-zinc-900 dark:text-zinc-100 border-zinc-900 dark:border-zinc-100' : 'text-zinc-500 border-transparent'"
                class="flex-1 py-3 text-sm font-medium border-b-2 transition" x-text="t('set.tab.privacy')"></button>
      </div>

      <div class="p-5 space-y-5">

        <!-- General tab -->
        <div x-show="settingsTab==='general'" class="space-y-5">
          <div>
            <label class="text-xs font-medium text-zinc-500 dark:text-zinc-400 uppercase tracking-wide" x-text="t('set.provider')"></label>
            <select x-model="settings.provider" @change="onProviderChange()"
                    class="mt-1.5 w-full bg-stone-50 dark:bg-zinc-950 border border-zinc-300 dark:border-zinc-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-zinc-500 dark:focus:border-zinc-500">
              <option value="anthropic">Anthropic (Claude)</option>
              <option value="openai">OpenAI (GPT)</option>
              <option value="moonshot">Moonshot (Kimi)</option>
              <option value="openrouter">OpenRouter</option>
              <option value="ollama">Ollama (lokal)</option>
            </select>
          </div>

          <div>
            <label class="text-xs font-medium text-zinc-500 dark:text-zinc-400 uppercase tracking-wide" x-text="t('set.model')"></label>
            <select :value="customMode ? '__custom__' : settings.model"
                    @change="onModelSelect($event.target.value)"
                    class="mt-1.5 w-full bg-stone-50 dark:bg-zinc-950 border border-zinc-300 dark:border-zinc-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-zinc-500 dark:focus:border-zinc-500">
              <template x-for="m in modelsForProvider()" :key="m.id">
                <option :value="m.id" x-text="m.label"></option>
              </template>
              <option value="__custom__" x-text="t('set.customOpt')"></option>
            </select>
            <input x-show="customMode"
                   x-model="settings.model"
                   :placeholder="t('set.customPh')"
                   class="mt-2 w-full bg-stone-50 dark:bg-zinc-950 border border-zinc-300 dark:border-zinc-700 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:border-zinc-500">
          </div>

          <div>
            <label class="text-xs font-medium text-zinc-500 dark:text-zinc-400 uppercase tracking-wide" x-text="t('set.apiKey')"></label>
            <div class="mt-1.5 flex gap-2">
              <input :type="showKey ? 'text' : 'password'"
                     x-model="settings.apiKey"
                     :placeholder="keyPlaceholder(settings.provider)"
                     class="flex-1 bg-stone-50 dark:bg-zinc-950 border border-zinc-300 dark:border-zinc-700 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:border-zinc-500 dark:focus:border-zinc-500">
              <button @click="showKey=!showKey"
                      class="px-3 bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-lg text-sm border border-zinc-300 dark:border-zinc-700">
                <span x-text="showKey ? t('set.hide') : t('set.show')"></span>
              </button>
            </div>
            <div class="mt-2 flex items-center gap-2">
              <button @click="testKey()"
                      :disabled="!settings.apiKey || testing"
                      class="text-xs px-3 py-1.5 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 hover:bg-black dark:hover:bg-white rounded-md font-medium disabled:opacity-50">
                <span x-text="testing ? t('set.testing') : t('set.test')"></span>
              </button>
              <span class="text-xs" :class="testStatusColor()" x-text="testStatus"></span>
            </div>
          </div>

          <div>
            <label class="flex items-center gap-2.5 cursor-pointer select-none">
              <input type="checkbox" x-model="settings.critic"
                     class="w-4 h-4 rounded border-zinc-300 dark:border-zinc-700 accent-zinc-900 dark:accent-zinc-100">
              <span class="text-sm font-medium text-zinc-700 dark:text-zinc-300" x-text="t('set.critic')"></span>
            </label>
            <p class="mt-1 ml-6 text-[11px] text-zinc-500 dark:text-zinc-500" x-text="t('set.criticHelp')"></p>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs font-medium text-zinc-500 dark:text-zinc-400 uppercase tracking-wide" x-text="t('set.platform')"></label>

  function boldclaimApp() {
    return {
      // State
      messages: [],
      input: '',
      pendingImages: [],
      busy: false,
      currentAbort: null,
      dragOver: false,
      lightboxImg: null,
      selectedExampleCat: null,
      settingsOpen: false,
      topicsVisible: false,
      settingsTab: 'general',
      sidebarOpen: localStorage.getItem('boldclaim_sidebar_open') === 'true',
      showKey: false,
      testing: false,
      testStatus: '',
      testStatusOk: null,
      archive: [],
      activeConvId: null,
      dark: document.documentElement.classList.contains('dark'),
      customMode: false,
      activeSection: null,
      // Advisory style suggestion derived from the opponent comment + platform.
      // Null = no suggestion yet. recoApplied flips true once the user clicks the chip.
      recoStyle: null,
      // Becomes true once the user manually touches the 3x3 picker, so the suggestion never stomps it.
      userOverrodePicker: false,

      settings: {
        provider: 'anthropic',
        model: '',
        apiKey: '',
        platform: 'Reddit',
        category: 'Fakten',
        hardness: 'Direkt',
        selectorStyle: 'pills',
        lang: 'de',
        voiceSample: '',
        critic: true
      },

      // Init
      init() {
        const saved = localStorage.getItem('boldclaim_settings_v2');
        if (saved) {
          try { Object.assign(this.settings, JSON.parse(saved)); } catch (e) {}
        }
        if (!this.settings.model) this.settings.model = this.defaultModel(this.settings.provider);
        this.customMode = !this.modelsForProvider().some(m => m.id === this.settings.model);
        this.loadArchive();
        const session = localStorage.getItem('boldclaim_session_v2');
        if (session) {
          try {
            const s = JSON.parse(session);
            if (s.messages && Date.now() - s.ts < 24 * 3600 * 1000) {
              this.messages = s.messages;
              this.activeConvId = s.id || null;
            }
          } catch (e) {}
        }
        window.addEventListener('resize', () => {
          if (window.innerWidth < 1024 && this.sidebarOpen) this.sidebarOpen = false;
        });
        // persist sidebar preference
        this.$watch('sidebarOpen', v => {
          localStorage.setItem('boldclaim_sidebar_open', v ? 'true' : 'false');
        });
        // keyboard shortcut: Cmd/Ctrl + B toggles sidebar
        window.addEventListener('keydown', (e) => {
          if ((e.metaKey || e.ctrlKey) && (e.key === 'b' || e.key === 'B')) {
            const tag = document.activeElement?.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA') return;
            e.preventDefault();
            this.sidebarOpen = !this.sidebarOpen;
          }
        });
      },

      loadArchive() {
        try {
          this.archive = JSON.parse(localStorage.getItem('boldclaim_archive_v2') || '[]');
        } catch (e) { this.archive = []; }
      },

      // Computed
      hasKey() { return this.settings.apiKey && this.settings.apiKey.length > 8; },
      canSend() {
        if (!(this.input.trim() || this.pendingImages.length)) return false;
        if (this.busy) return false;
        return this.hasKey();
      },
      countUserMsgs() { return this.messages.filter(m => m.role === 'user').length; },
      modelLabel() {
        if (this.hasKey()) return `${this.settings.provider} · ${this.settings.model || this.defaultModel(this.settings.provider)}`;
        return this.t('comp.noKey');
      },
      defaultModel(p) { return PROVIDERS[p]?.defaultModel || ''; },
      keyPlaceholder(p) { return PROVIDERS[p]?.keyPlaceholder || ''; },
      modelsForProvider() { return PROVIDERS[this.settings.provider]?.models || []; },
      onModelSelect(value) {
        if (value === '__custom__') {
          this.customMode = true;
          this.settings.model = '';
        } else {
          this.customMode = false;
          this.settings.model = value;
        }
      },
      testStatusColor() {
        if (this.testStatusOk === true) return 'text-emerald-600 dark:text-emerald-400';
        if (this.testStatusOk === false) return 'text-red-600 dark:text-red-400';
        return 'text-zinc-500';
      },

      // i18n + examples
      get examples() { return EXAMPLES[this.settings.lang] || EXAMPLES.de; },
      t(key) {
        const dict = I18N[this.settings.lang] || I18N.de;
        return dict[key] || I18N.de[key] || key;
      },
      setLang(lang) {
        this.settings.lang = lang;
        this.saveSettings();
        document.documentElement.lang = lang;
      },

      // Theme
      toggleTheme() {
        this.dark = !this.dark;
        document.documentElement.classList.toggle('dark', this.dark);
        localStorage.setItem('boldclaim_theme_v2', this.dark ? 'dark' : 'light');
      },

      // Settings
      onProviderChange() {
        this.settings.model = this.defaultModel(this.settings.provider);
        this.customMode = false;
        this.testStatus = '';
        this.testStatusOk = null;
      },
      saveSettings() {
        localStorage.setItem('boldclaim_settings_v2', JSON.stringify(this.settings));
      },
      async testKey() {
        this.testing = true;
        this.testStatus = '';
        this.testStatusOk = null;
        try {
          const reply = await this.callProvider({
            systemPrompt: 'Antworte nur mit dem Wort: ok',
            messages: [{ role: 'user', content: 'test' }],
            stream: false
          });
          if (reply && reply.toLowerCase().includes('ok')) {
            this.testStatus = this.t('set.testOk');
            this.testStatusOk = true;
          } else {
            this.testStatus = this.t('set.testReceived');
            this.testStatusOk = true;
          }
        } catch (e) {
          this.testStatus = e.message.slice(0, 80);
          this.testStatusOk = false;
        } finally {
          this.testing = false;
        }
      },

      // Compose
      useExample(text) {
        this.input = text;
        this.selectedExampleCat = null;
        this.$nextTick(() => {
          const ta = document.querySelector('textarea');
          if (ta) ta.focus();
        });
      },
      currentExamplePoints() {
        if (!this.selectedExampleCat) return [];
        const group = this.examples.find(g => g.cat === this.selectedExampleCat);
        return group ? group.points : [];
      },
      handlePaste(e) {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type?.startsWith('image/')) {
            e.preventDefault();
            const file = item.getAsFile();
            if (file) this.addImage(file);
          }
        }
        // Text paste lands in this.input after the native input event; recompute the suggestion next tick.
        this.$nextTick(() => this.recommendStyle());
      },
      handleDrop(e) {
        this.dragOver = false;
        const files = e.dataTransfer?.files;
        if (!files) return;
        for (const f of files) {
          if (f.type.startsWith('image/')) this.addImage(f);
        }
      },
      handleFiles(e) {
        for (const f of e.target.files || []) {
          if (f.type.startsWith('image/')) this.addImage(f);
        }
        e.target.value = '';
      },
      loadVoiceSample(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.size > 200 * 1024) {
          alert('Voice-Sample > 200KB, ist zu groß. Kürze auf prägnante Beispiele.');
          e.target.value = '';
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          this.settings.voiceSample = reader.result;
          this.saveSettings();
        };
        reader.readAsText(file);
        e.target.value = '';
      },
      addImage(file) {
        if (this.pendingImages.length >= 5) return;
        if (file.size > 5 * 1024 * 1024) {
          alert(this.t('comp.imgTooLarge'));
          return;
        }
        const reader = new FileReader();
        reader.onload = () => this.pendingImages.push(reader.result);
        reader.readAsDataURL(file);
      },

      // Send
      async send() {
        if (!this.canSend()) return;

        const userMsg = {
          id: crypto.randomUUID(),
          role: 'user',
          content: this.input.trim(),
          images: [...this.pendingImages],
          ts: Date.now()
        };
        if (this.messages.length === 0) this.activeConvId = crypto.randomUUID();
        this.messages.push(userMsg);
        this.input = '';
        this.pendingImages = [];
        // Clear the advisory suggestion + override flag for the next comment.
        this.recoStyle = null;
        this.userOverrodePicker = false;
        this.persistSession();
        this.scrollDown();

        // Pinecone-Context (only if WORKER_URL set)
        let context = { docs: [], systemPrompt: this.fallbackSystemPrompt() };
        if (WORKER_URL) {
          try {
            const ctxRes = await fetch(WORKER_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                query: this.queryFromHistory(),
                topK: 5,
                platform: this.settings.platform,
                tone: this.settings.category + ' / ' + this.settings.hardness,
                lang: this.settings.lang
              })
            });
            if (ctxRes.ok) {
              const w = await ctxRes.json();
              context.docs = w.docs || [];
              context.sourceUrls = w.sourceUrls || [];
              // Knowledge from Pinecone, but ALWAYS keep our voice+tactics prompt
              // (do not let the worker's basic prompt overwrite it).
              // Live method/tactics from Pinecone (worker), with the built-in block as fallback.
              const knowledge = this.knowledgeBlock(context.docs);
              context.systemPrompt = this.fallbackSystemPrompt(w.method) + (knowledge ? '\n\n' + knowledge : '');
            }
          } catch (e) { /* fallback */ }
        }

        const providerMessages = this.buildProviderMessages();
        this.activeSection = null;
        const assistantMsg = {
          id: crypto.randomUUID(),
          role: 'assistant',
          content: '',
          streaming: true,
          sources: context.docs || [],
          sourceUrls: context.sourceUrls || [],
          ts: Date.now()
        };
        this.messages.push(assistantMsg);
        // Reactive proxy reference (Alpine wraps array elements lazily; mutating the local
        // pre-push object does NOT trigger reactivity, so we re-fetch via index)
        const idx = this.messages.length - 1;
        this.busy = true;
        this.scrollDown();

        try {
          await this.callProvider({
            systemPrompt: context.systemPrompt,
            messages: providerMessages,
            stream: true,
            onDelta: (text) => {
              this.messages[idx].content += text;
              this.scrollDown();
            }
          });
        } catch (e) {
          this.messages[idx].error = e.message;
        } finally {
          this.messages[idx].streaming = false;
          if (!this.messages[idx].error) this.messages[idx].content = this.deAI(this.messages[idx].content);
          this.busy = false;
          this.currentAbort = null;
          this.persistSession();
          // Critic pass refines the answer (own-goal/inversion, grounding, voice) before the trust check verifies it.
          // Only with retrieved evidence: without it the grounding rule would strip correct numbers from a fallback answer.
          if (this.settings.critic && !this.messages[idx].error && this.messages[idx].content
              && this.messages[idx].sources && this.messages[idx].sources.length) {
            await this.criticPass(idx);
          }
          // Trust check runs AFTER the answer is rendered, so the user never waits for it.
          // Only when the answer succeeded and the message actually has sources to check against.
          const am = this.messages[idx];
          if (am && !am.error && am.content && am.sources && am.sources.length) {
            await this.runTrustCheck(idx);
          }
        }
      },

      // Critic pass: ONE refine call that approximates the skill's stress-test + red-team gate.
      // Catches own-goals/inversion, enforces grounding (every number must be in the evidence),
      // strips strawmen and screenshot-able concessions, cleans the voice. Refines in place.
      // BYOK, runs in the user's browser via their own key, never throws.
      async criticPass(idx) {
        const msg = this.messages[idx];
        if (!msg || msg.error || !msg.content) return;
        const msgId = msg.id;
        const isDE = this.settings.lang === 'de';
        const comment = this.queryFromHistory();
        const evidence = (msg.sources || []).map((s, i) => {
          let line = '[' + (i + 1) + '] ' + (s.source ? s.source + ': ' : '') + (s.snippet || '');
          // If this doc was armored with a pre-tested rebuttal answer, hand it to the critic so it
          // defends with the proven line instead of improvising (and so FLANKE does not kill the point).
          if (s.rebuttal_answer) {
            line += '\n    ' + (isDE
              ? 'BILLIGSTE GEGEN-REPLIK: ' + (s.rebuttal || '(unbenannt)') + '\n    GETESTETE ANTWORT: ' + s.rebuttal_answer
              : 'CHEAPEST COMEBACK: ' + (s.rebuttal || '(unnamed)') + '\n    TESTED ANSWER: ' + s.rebuttal_answer);
          }
          return line;
        }).join('\n') || (isDE ? '(keine Belege abgerufen)' : '(no evidence retrieved)');
        // Live-source fetch: pull the top source's live page (server-side via the worker) so the
        // critic can reconcile the draft's numbers against the current page and catch stale figures.
        let live = '';
        if (msg.sourceUrls && msg.sourceUrls.length && WORKER_URL) {
          try {
            const fr = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'fetchSource', url: msg.sourceUrls[0] }) });
            if (fr.ok) { const fd = await fr.json(); live = (fd.text || '').slice(0, 3000); }
          } catch (e) { /* live-fetch is non-fatal */ }
        }
        const sys = isDE
          ? `Du bist ein gnadenloser Konter-Prüfer für Bold Claim. Du verbesserst den ENTWURF, du lobst nicht und erklärst deine Änderungen nicht. Gib NUR den finalen Konter zurück, im exakt gleichen Aufbau wie der Entwurf (sind ein Analyse-Teil und ein ~~~REPLY~~~-Marker vorhanden, behalte sie).
Prüfe und fixe in dieser Reihenfolge:
1. ERFINDUNG/GROUNDING: jede Zahl, jedes Datum, jede Quelle MUSS in den BELEGEN stehen. Aus dem Gedächtnis gerundete oder erfundene Zahlen raus oder durch belegte ersetzen. Fehlt ein Beleg, Behauptung schwächen bis sie gedeckt ist, nicht raten. Liegt eine LIVE-QUELLE bei, gleiche jede Zahl damit ab und korrigiere veraltete Werte auf den Live-Stand.
2. EIGENTOR/INVERSION: jede Statistik invertiert prüfen. Hilft sie dem Gegner wenn er sie zurückwirft (38% durch X heißt 62% durch Y), raus oder anders framen.
3. STROHMANN: nur kontern was der Gegner WÖRTLICH gesagt hat.
4. KONZESSION: kein Satz der als Gegner-Screenshot funktioniert, Kontext in den Satz bauen.
5. STIMME: keine Gedankenstriche, keine Floskeln, Punkt zuerst, max 4-5 Sätze, nicht moralisieren.
6. FLANKE: Nenne die billigste Gegen-Replik auf diesen Konter. Beantworte sie in einem Halbsatz. Ist die Replik wahr und stark und du kannst sie nicht mit der Aktenlage schlagen → STREICHE den Punkt, statt ihn schwach zu verteidigen. Liegt zu einem Beleg eine GETESTETE ANTWORT bei, nutze sie zum Verteidigen statt zu improvisieren.
7. FRAGILE MUSTER: Prüfe gegen aggregate-vs-per-capita, whataboutism, survivorship, cherry-picked-timeframe, appeal-to-future-tech, naked-aggregate-quote. Trifft einer zu, ist der Punkt im Zweifel raus.
Ist der Entwurf schon sauber, gib ihn unverändert zurück.`
          : `You are a merciless counter-checker for Bold Claim. You IMPROVE the draft, you do not praise and do not explain your changes. Return ONLY the final counter, in the exact same structure as the draft (if an analysis part and a ~~~REPLY~~~ marker are present, keep them).
Check and fix, in order:
1. FABRICATION/GROUNDING: every number, date and source MUST appear in the EVIDENCE. Remove or replace memory-rounded or invented numbers with sourced ones. If a fact is missing, weaken the claim until it is covered, do not guess. If a LIVE SOURCE is attached, reconcile every number against it and correct stale values to the live figure.
2. OWN-GOAL/INVERSION: check every statistic inverted. If it helps the opponent when quoted back (38% by X means 62% by Y), cut or reframe it.
3. STRAWMAN: only counter what the opponent literally said.
4. CONCESSION: no sentence that works as their screenshot, build the context into the sentence.
5. VOICE: no em-dashes, no filler, point first, max 4-5 sentences, do not moralise.
6. FLANK: Name the cheapest comeback to this counter. Answer it in half a sentence. If that comeback is true and strong and you cannot beat it with the record → CUT the point instead of defending it weakly. If a piece of evidence carries a TESTED ANSWER, use it to defend instead of improvising.
7. FRAGILE PATTERNS: Check against aggregate-vs-per-capita, whataboutism, survivorship, cherry-picked-timeframe, appeal-to-future-tech, naked-aggregate-quote. If one applies, when in doubt the point is out.
If the draft is already clean, return it unchanged.`;
        const user = (isDE ? 'GEGNER-KOMMENTAR:\n' : 'OPPONENT COMMENT:\n') + comment +
          '\n\n' + (isDE ? 'BELEGE:\n' : 'EVIDENCE:\n') + evidence +
          (live ? '\n\n' + (isDE ? 'LIVE-QUELLE (frisch geladene Original-Seite, Auszug):\n' : 'LIVE SOURCE (freshly fetched original page, excerpt):\n') + live : '') +
          '\n\n' + (isDE ? 'ENTWURF:\n' : 'DRAFT:\n') + msg.content;
        try {
          const refined = await this.callProvider({ systemPrompt: sys, messages: [{ role: 'user', content: user }], stream: false });
          const cur = this.messages.findIndex(m => m.id === msgId);
          if (cur === -1) return;
          const clean = this.deAI(String(refined || '').trim());
          if (clean && clean.length > 20) {
            this.messages[cur].content = clean;
            this.messages[cur].refined = true;
          }
        } catch (e) {
          // critic failure is non-fatal: the original draft stands
        } finally {
          this.persistSession();
        }
      },

      // BYOK trust check (source self-verification). Runs in the user's browser via their own
      // provider key, never on a server. Sets messages[idx].trust to one of:
      // 'checking' | 'pass' | 'fail' | 'unsure' | 'unknown'. Never throws; on any error the
      // answer stands unchanged with trust 'unknown' (badge renders nothing).
      async runTrustCheck(idx) {
        const msg = this.messages[idx];
        if (!msg || !msg.sources || !msg.sources.length) return;
        // Guard: pin the message id so a newer message never receives a stale verdict.
        const msgId = msg.id;
        this.messages[idx].trust = 'checking';
        try {
          const answer = this.splitContent(msg.content || '').reply || msg.content || '';
          const sourceText = msg.sources
            .map((s, i) => {
              const label = s.source ? (s.source + ': ') : '';
              return '[' + (i + 1) + '] ' + label + (s.snippet || '');
            })
            .join('\n');
          const verifySystem = 'Du bist ein strenger Faktenprüfer. Prüfe NUR, ob die folgende Antwort durch die angegebenen Quellen gedeckt ist und ihnen nicht widerspricht. Antworte mit GENAU einem Wort: ja, nein oder unklar.';
          const verifyUser = 'ANTWORT:\n' + answer + '\n\nQUELLEN:\n' + sourceText;
          const raw = await this.callProvider({
            systemPrompt: verifySystem,
            messages: [{ role: 'user', content: verifyUser }],
            stream: false
          });
          // The message may have moved if the array changed; re-find it by id and bail if it is gone.
          const curIdx = this.messages.findIndex(m => m.id === msgId);
          if (curIdx === -1) return;
          const first = String(raw || '').trim().toLowerCase().replace(/^[^a-zäöü]+/, '');
          let verdict = 'unsure';
          if (first.startsWith('ja')) verdict = 'pass';
          else if (first.startsWith('nein')) verdict = 'fail';
          this.messages[curIdx].trust = verdict;
        } catch (e) {
          const curIdx = this.messages.findIndex(m => m.id === msgId);
          if (curIdx !== -1) this.messages[curIdx].trust = 'unknown';
        } finally {
          this.currentAbort = null;
          this.persistSession();
        }
      },

      cancel() {
        if (this.currentAbort) this.currentAbort.abort();
      },

      queryFromHistory() {
        const recentUser = this.messages
          .filter(m => m.role === 'user')
          .slice(-2)
          .map(m => m.content)
          .join(' ');
        return recentUser.slice(0, 1000);
      },

      buildProviderMessages() {
        const out = [];
        const visionProvider = PROVIDERS[this.settings.provider]?.vision || false;
        for (const m of this.messages) {
          if (m.role === 'user') {
            if (m.images?.length && visionProvider) {
              if (this.settings.provider === 'anthropic') {
                const content = [];
                for (const img of m.images) {
