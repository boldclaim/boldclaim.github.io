        const p = this.settings.provider;
        if (p === 'anthropic') return this.callAnthropic({ systemPrompt, messages, stream, onDelta });
        if (p === 'openai' || p === 'moonshot' || p === 'openrouter') return this.callOpenAICompat({ systemPrompt, messages, stream, onDelta });
        if (p === 'ollama') return this.callOllama({ systemPrompt, messages, stream, onDelta });
        throw new Error('Unbekannter Provider');
      },

      async callAnthropic({ systemPrompt, messages, stream, onDelta }) {
        const ctrl = new AbortController();
        this.currentAbort = ctrl;
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key': this.settings.apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
            'content-type': 'application/json'
          },
          body: JSON.stringify({
            model: this.settings.model || PROVIDERS.anthropic.defaultModel,
            max_tokens: 2048,
            system: systemPrompt,
            messages,
            stream
          }),
          signal: ctrl.signal
        });
        if (!res.ok) throw new Error(`Anthropic ${res.status}: ${(await res.text()).slice(0, 200)}`);
        if (!stream) {
          const data = await res.json();
          return data.content?.[0]?.text || '';
        }
        return this.consumeSSE(res, (event) => {
          if (event.type === 'content_block_delta' && event.delta?.text) onDelta(event.delta.text);
        });
      },

      async callOpenAICompat({ systemPrompt, messages, stream, onDelta }) {
        const ctrl = new AbortController();
        this.currentAbort = ctrl;
        const provider = this.settings.provider;
        const url = PROVIDERS[provider].url;
        const headers = {
          'Authorization': `Bearer ${this.settings.apiKey}`,
          'Content-Type': 'application/json'
        };
        if (provider === 'openrouter') {
          headers['HTTP-Referer'] = 'https://boldclaim.github.io';
          headers['X-Title'] = 'Boldclaim';
        }
        const res = await fetch(url, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            model: this.settings.model || PROVIDERS[provider].defaultModel,
            messages: [{ role: 'system', content: systemPrompt }, ...messages],
            stream,
            max_tokens: 2048
          }),
          signal: ctrl.signal
        });
        if (!res.ok) throw new Error(`${provider} ${res.status}: ${(await res.text()).slice(0, 200)}`);
        if (!stream) {
          const data = await res.json();
          return data.choices?.[0]?.message?.content || '';
        }
        return this.consumeSSE(res, (event) => {
          const delta = event.choices?.[0]?.delta?.content;
          if (delta) onDelta(delta);
        });
      },

      async callOllama({ systemPrompt, messages, stream, onDelta }) {
        const ctrl = new AbortController();
        this.currentAbort = ctrl;
        const url = (this.settings.apiKey?.includes('://') ? this.settings.apiKey : 'http://' + this.settings.apiKey) || 'http://localhost:11434';
        const res = await fetch(url.replace(/\/+$/, '') + '/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: this.settings.model || PROVIDERS.ollama.defaultModel,
            messages: [{ role: 'system', content: systemPrompt }, ...messages],
            stream
          }),
          signal: ctrl.signal
        });
        if (!res.ok) throw new Error(`Ollama ${res.status}`);
        if (!stream) {
          const data = await res.json();
          return data.message?.content || '';
        }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let acc = '';
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.trim()) continue;
            try {
              const obj = JSON.parse(line);
              const t = obj.message?.content;
              if (t) { acc += t; onDelta(t); }
            } catch (e) {}
          }
        }
        return acc;
      },

      async consumeSSE(res, handler) {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const blocks = buffer.split('\n\n');
          buffer = blocks.pop();
          for (const block of blocks) {
            for (const line of block.split('\n')) {
              if (!line.startsWith('data: ')) continue;
              const payload = line.slice(6).trim();
              if (payload === '[DONE]') return;
              try { handler(JSON.parse(payload)); } catch (e) {}
            }
          }
        }
      },

      // Persistence
      persistSession() {
        try {
          localStorage.setItem('boldclaim_session_v2', JSON.stringify({
            ts: Date.now(),
            id: this.activeConvId,
            messages: this.messages.slice(-40)
          }));
          if (this.activeConvId && this.messages.length > 0) this.upsertArchive();
        } catch (e) {}
      },

      upsertArchive() {
        try {
          let archive = JSON.parse(localStorage.getItem('boldclaim_archive_v2') || '[]');
          const idx = archive.findIndex(c => c.id === this.activeConvId);
          const entry = {
            id: this.activeConvId,
            ts: Date.now(),
            title: (this.messages.find(m => m.role === 'user')?.content || 'Conversation').slice(0, 80),
            messages: this.messages
          };
          if (idx >= 0) archive[idx] = entry;
          else archive.unshift(entry);
          archive = archive.slice(0, 50);
          localStorage.setItem('boldclaim_archive_v2', JSON.stringify(archive));
          this.archive = archive;
        } catch (e) {}
      },

      loadConversation(id) {
        const conv = this.archive.find(c => c.id === id);
        if (!conv) return;
        this.messages = conv.messages;
        this.activeConvId = conv.id;
        this.persistSession();
        if (window.innerWidth < 1024) this.sidebarOpen = false;
      },

      deleteConversation(id) {
        if (!confirm(this.t('set.deleteConfConfirm'))) return;
        this.archive = this.archive.filter(c => c.id !== id);
        localStorage.setItem('boldclaim_archive_v2', JSON.stringify(this.archive));
        if (this.activeConvId === id) this.newChat();
      },

      newChat() {
        this.messages = [];
        this.input = '';
        this.pendingImages = [];
        this.activeConvId = null;
        localStorage.removeItem('boldclaim_session_v2');
      },

      exportConversations() {
        try {
          const all = this.messages.length
            ? [{ id: this.activeConvId, ts: Date.now(), title: 'aktuell', messages: this.messages }, ...this.archive]
            : this.archive;
          const blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `boldclaim-export-${new Date().toISOString().slice(0,10)}.json`;
          a.click();
          URL.revokeObjectURL(url);
        } catch (e) { alert('Export fehlgeschlagen: ' + e.message); }
      },

      clearAll() {
        if (!confirm(this.t('set.clearConfirm'))) return;
        ['boldclaim_settings_v2', 'boldclaim_session_v2', 'boldclaim_archive_v2', 'boldclaim_theme_v2'].forEach(k => localStorage.removeItem(k));
        this.messages = [];
        this.archive = [];
        this.activeConvId = null;
        Object.assign(this.settings, { provider: 'anthropic', model: '', apiKey: '', platform: 'Reddit', category: 'Fakten', hardness: 'Direkt', selectorStyle: 'pills', lang: 'de' });
        this.settings.model = this.defaultModel('anthropic');
      },

      // Split assistant content into analysis + reply
      splitContent(text) {
        if (!text) return { analysis: '', reply: '' };
        const marker = '~~~REPLY~~~';
        const idx = text.indexOf(marker);
        if (idx === -1) {
          // While streaming, treat the whole as analysis-in-progress so the user
          // sees structured content from the start. The reply renders empty until
          // the marker arrives.
          if (text.startsWith('## Analyse') || text.startsWith('# Analyse')) {
            return { analysis: text.trim(), reply: '' };
          }
          return { analysis: '', reply: text };
        }
        return {
          analysis: text.slice(0, idx).trim(),
          reply: text.slice(idx + marker.length).trim()
        };
      },

      // Markdown rendering
      escapeHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      },
      slugify(s) {
        return s.toLowerCase().normalize('NFKD').replace(/[̀-ͯ]/g, '')
          .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 60);
      },
      // De-AI pass: strip the machine tells (em-dashes, filler transitions, hedges,
      // performative openers/closers) so every answer reads in-voice. Runs on the rendered
      // text AND on the stored text at completion (so Reddit/Plain copies are clean too).
      // Deterministic and idempotent.
      deAI(text) {
        if (!text) return text;
        let t = text;
        // Dashes: numeric range -> hyphen, prose aside -> comma. Word-hyphens untouched.
        t = t.replace(/(\d) ?[—–―] ?(\d)/g, '$1-$2').replace(/ ?[—–―] ?/g, ', ');
        // Fancy punctuation -> plain
        t = t.replace(/[“”„«»]/g, '"').replace(/[‘’‚]/g, "'").replace(/…/g, '...');
        // Sentence-initial filler transitions -> drop, keep the clause
        const fillers = '(?:Dar[üu]ber hinaus|Des Weiteren|Letztendlich|Letztlich|Zusammenfassend|Abschlie[ßs]end|Furthermore|Moreover|In addition|Additionally|Ultimately|Consequently|Notably|Importantly|Essentially)';
        t = t.replace(new RegExp('(^|[.!?]\\s+|\\n+)' + fillers + ',?\\s+', 'gu'), '$1');
        // Openers / hedges / self-reference / performative closers -> remove
        const kill = [
          /Das ist ein interessanter Punkt[.!,]?\s*/gi,
          /(?:Gute|Gro[ßs]artige|Spannende) Frage[.!,]?\s*/gi,
          /Lass mich das (?:kurz )?aufdr[öo]seln[.!,:]?\s*/gi,
          /(?:Great|Good|Excellent|Interesting) question[.!,]?\s*/gi,
          /That'?s an? (?:great|good|fair|valid|interesting) question[.!,]?\s*/gi,
          /Let me break (?:this|that) down[.!,:]?\s*/gi,
          /Es ist wichtig,? (?:zu beachten|anzumerken|zu erw[äa]hnen),?\s*(?:dass\s*)?/gi,
          /Es sei (?:angemerkt|erw[äa]hnt),?\s*(?:dass\s*)?/gi,
          /It'?s (?:important|worth) (?:to note|noting|mentioning)(?: that)?,?\s*/gi,
          /It is (?:important|worth) (?:to note|noting|mentioning)(?: that)?,?\s*/gi,
          /Als KI(?:[- ]Sprachmodell)?,?\s*/gi,
          /As an AI(?: language model)?,?\s*/gi,
          /(?:Ich hoffe|Hoffe),? das hilft(?: dir)?[.!]?\s*/gi,
          /I hope (?:this|that) helps[.!]?\s*/gi,
          /Hope (?:this|that) helps[.!]?\s*/gi,
          /Lass(?:t)? mich wissen,? wenn[^.!?\n]*[.!?]\s*/gi,
          /Let me know if[^.!?\n]*[.!?]\s*/gi,
          /\bBoom[.!]?(?=\s|$)/gi,
          /\bMic[- ]?drop[.!]?\s*/gi,
        ];
        for (const re of kill) t = t.replace(re, '');
        // Word-level tells
        t = t.replace(/\bdelve into\b/gi, 'look at').replace(/\bdelve\b/gi, 'look')
             .replace(/\bin order to\b/gi, 'to').replace(/\ba tapestry of\b/gi, '')
             .replace(/\bnavigate the complexit(?:y|ies)(?: of)?\b/gi, '');
        // Re-capitalize sentence starts left lowercase by removals
        t = t.replace(/(^|[.!?]["')\]]?\s+|\n+)(\p{Ll})/gu, (m, pre, ch) => pre + ch.toUpperCase());
        // Tidy spacing/punctuation
        t = t.replace(/[ \t]{2,}/g, ' ').replace(/ +([,.;:!?])/g, '$1')
             .replace(/,\s*,/g, ',').replace(/[ \t]+\n/g, '\n').replace(/\n{3,}/g, '\n\n');
        return t.trim();
      },
      renderMarkdown(text) {
        if (!text) return '';
        // Strip purpose comments (extracted separately for popup) before any other processing
        text = text.replace(/<!--\s*purpose:[\s\S]*?-->/g, '');
        text = this.deAI(text);
        let html = this.escapeHtml(text);
        // Code spans
        html = html.replace(/`([^`\n]+)`/g, '<code class="font-mono text-[0.9em] bg-zinc-100 dark:bg-zinc-800 rounded px-1">$1</code>');
        // Headings ## — `t` is already escaped from the escapeHtml call above, do NOT escape again
        html = html.replace(/^##\s+(.+)$/gm, (m, t) => {
          const slug = this.slugify(t.replace(/&[a-z]+;/g, '')); // strip entities for slug calc
          return `<h3 class="section-header" data-section-id="${slug}">${t}</h3>`;
        });
        // Bold
        html = html.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
        // Italic
        html = html.replace(/(?<![*\w])\*([^*\n]+?)\*(?![*\w])/g, '<em>$1</em>');
        // Markdown links
        html = html.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer" class="link">$1</a>');
        // Bare http(s) URLs
        html = html.replace(/(?<!["=>\w])(https?:\/\/[^\s<)]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer" class="link">$1</a>');
        // Bare common domains
        const domains = ['bka.de','tagesschau.de','destatis.de','bundesverfassungsgericht.de','pubmed.ncbi.nlm.nih.gov','correctiv.org','pei.de','bundestag.de','rki.de','mediendienst-integration.de','spiegel.de','welt.de','zeit.de','sueddeutsche.de','faz.net','afd.de','t-online.de','nordkurier.de','kfn.de','svr-migration.de','iab.de','ifo.de','kriminologie.uni-koeln.de','volksverpetzer.de','abgeordnetenwatch.de','dserver.bundestag.de','zdfheute.de'];
        for (const d of domains) {
          const re = new RegExp(`(?<!["'>\\w/.])(${d.replace(/\./g,'\\.')}\\/[^\\s<,;)]*)`, 'g');
          html = html.replace(re, '<a href="https://$1" target="_blank" rel="noopener noreferrer" class="link">$1</a>');
        }
        // Bullet lists
        html = html.replace(/(^|\n)((?:- [^\n]+\n?)+)/g, (_m, pre, block) => {
          const items = block.trim().split('\n').map(l => l.replace(/^- /, '').trim()).filter(Boolean);
          return pre + '<ul>' + items.map(i => `<li>${i}</li>`).join('') + '</ul>';
        });
        // Numbered lists
        html = html.replace(/(^|\n)((?:\d+\. [^\n]+\n?)+)/g, (_m, pre, block) => {
          const items = block.trim().split('\n').map(l => l.replace(/^\d+\.\s*/, '').trim()).filter(Boolean);
          return pre + '<ol>' + items.map(i => `<li>${i}</li>`).join('') + '</ol>';
        });
        // Paragraphs
        const blocks = html.split(/\n\n+/).map(b => {
          if (b.match(/^\s*<(h3|ul|ol|blockquote)/)) return b;
          return '<p>' + b.replace(/\n/g, '<br>') + '</p>';
        });
        return blocks.join('');
      },

      // Section parsing — extracts title AND purpose annotation (<!--purpose: ...-->)
      parseSections(text) {
        if (!text) return [];
        const sections = [];
        // Header followed optionally by a purpose-comment on the next non-empty line
        const re = /^##\s+(.+?)\s*$\s*(?:<!--\s*purpose:\s*([\s\S]+?)\s*-->)?/gm;
        for (const m of text.matchAll(re)) {
          const title = m[1].trim();
          const purpose = (m[2] || '').trim().replace(/\s+/g, ' ');
          sections.push({ id: this.slugify(title), title, purpose });
        }
        return sections;
      },
      lastAssistantSections() {
        for (let i = this.messages.length - 1; i >= 0; i--) {
          const m = this.messages[i];
          if (m.role === 'assistant' && m.content) {
            return this.parseSections(this.splitContent(m.content).reply);
          }
        }
        return [];
      },
      currentSection() {
        return this.lastAssistantSections().find(s => s.id === this.activeSection);
      },
      currentSectionIdx() {
        const sections = this.lastAssistantSections();
        const i = sections.findIndex(s => s.id === this.activeSection);
        return { idx: i + 1, total: sections.length };
      },
      prevSection() {
        const sections = this.lastAssistantSections();
        const i = sections.findIndex(s => s.id === this.activeSection);
        if (i > 0) this.selectSection(sections[i - 1].id);
      },
      nextSection() {
        const sections = this.lastAssistantSections();
        const i = sections.findIndex(s => s.id === this.activeSection);
        if (i >= 0 && i < sections.length - 1) this.selectSection(sections[i + 1].id);
      },
      dismissSection() {
        this.activeSection = null;
        document.querySelectorAll('.section-active').forEach(n => n.classList.remove('section-active'));
      },
      selectSection(id) {
        this.activeSection = id;
        this.$nextTick(() => {
          document.querySelectorAll('.section-active').forEach(n => n.classList.remove('section-active'));
          const header = document.querySelector(`[data-section-id="${id}"]`);
          if (!header) return;
          header.scrollIntoView({ behavior: 'smooth', block: 'start' });
          const group = [header];
          let next = header.nextElementSibling;
          while (next && !(next.tagName === 'H3' && next.classList.contains('section-header'))) {
            group.push(next);
            next = next.nextElementSibling;
          }
          group.forEach(el => {
            el.classList.add('section-active');
            el.classList.remove('section-flash');
            void el.offsetWidth;
            el.classList.add('section-flash');
          });
        });
      },
      // Click anywhere within a section paragraph to activate
      onSectionClick(e) {
        const direct = e.target.closest('[data-section-id]');
        if (direct) {
          this.selectSection(direct.dataset.sectionId);
          return;
        }
        let el = e.target;
        while (el && el.classList && !el.classList.contains('prose-content')) {
          let sibling = el.previousElementSibling;
          while (sibling) {
            if (sibling.tagName === 'H3' && sibling.classList?.contains('section-header')) {
              this.selectSection(sibling.dataset.sectionId);
              return;
            }
            sibling = sibling.previousElementSibling;
          }
          el = el.parentElement;
        }
      },

      // Copy
      copyAs(msg, mode, ev) {
        let text = this.splitContent(msg.content || '').reply || msg.content || '';
        if (mode === 'plain') text = this.toPlain(text);
        navigator.clipboard.writeText(text);
        msg.copiedAs = mode;
        setTimeout(() => { msg.copiedAs = null; }, 1500);
      },
      toPlain(text) {
        return text
          .replace(/`([^`]+)`/g, '$1')
          .replace(/\*\*([^*]+)\*\*/g, '$1')
          .replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '$1')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1 ($2)')
          .replace(/^#{1,6}\s+/gm, '')
          .replace(/^>\s?/gm, '')
          .replace(/^- /gm, '• ')
          .trim();
      },

      scrollDown() {
        this.$nextTick(() => {
          const main = document.querySelector('main');
          if (main) main.scrollTop = main.scrollHeight;
        });
      }
    };
  }
</script>

</body>
